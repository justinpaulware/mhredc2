<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>MHREDC / Transformational Regional Initiatives</title>

<link href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- Your layer config -->
<script src="layers.js"></script>

<style>
body {
  margin: 0;
  font-family: Helvetica, sans-serif;
}

#sidebar {
  position: absolute;
  top: 0;
  left: 0;
  width: 260px;
  height: 100vh;
  background: #fff;
  border-right: 1px solid #ddd;
  padding: 12px;
  overflow-y: auto;
}

#map {
  position: absolute;
  top: 0;
  left: 260px;
  right: 0;
  bottom: 0;
}

.layer-item {
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<div id="sidebar">
  <h3>Layers</h3>
  <div id="layerList"></div>
</div>

<div id="map"></div>

<script>

// =======================
// MAP INIT
// =======================

const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/positron",
  center: [-74.1958906253, 41.6164604109],
  zoom: 8
});

// =======================
// LOAD ON READY
// =======================


map.on("load", () => {
  LAYERS.forEach(loadLayer);

// =======================
// LAYER DISPATCHER
// =======================

function loadLayer(layer) {
  if (layer.type === "sheet") loadSheet(layer);
  if (layer.type === "rest") loadRest(layer);
}

// =======================
// SHEET LAYER
// =======================

function loadSheet(layer) {

  Papa.parse(layer.url, {
    download: true,
    header: true,

    complete: (res) => {

      const geojson = {
        type: "FeatureCollection",
        features: res.data
          .filter(d => d[layer.latField] && d[layer.lngField])
          .map(d => ({
            type: "Feature",
            geometry: {
              type: "Point",
              coordinates: [
                parseFloat(d[layer.lngField]),
                parseFloat(d[layer.latField])
              ]
            },
            properties: d
          }))
      };

      map.addSource(layer.id, {
        type: "geojson",
        data: geojson
      });

      map.addLayer({
        id: layer.id,
        type: "circle",
        source: layer.id,
        paint: {
          "circle-radius": layer.paint.radius || 6,
          "circle-color": layer.paint.color || "#3b82f6",
          "circle-stroke-width": 1,
          "circle-stroke-color": "#fff"
        }
      });
    }
  });
}

// =======================
// REST LAYER
// =======================

function loadRest(layer) {

  fetch(layer.url)
    .then(r => r.json())
    .then(data => {

      map.addSource(layer.id, {
        type: "geojson",
        data
      });

      map.addLayer({
        id: layer.id,
        type: "fill",
        source: layer.id,
        paint: {
          "fill-color": layer.paint.fill || "#f59e0b",
          "fill-opacity": layer.paint.opacity || 0.3,
          "fill-outline-color": layer.paint.outline || "#b45309"
        }
      });
    });
}

// =======================
// UI (LAYER TOGGLES)
// =======================

function buildLayerUI() {

  const el = document.getElementById("layerList");
  el.innerHTML = "";

  LAYERS.forEach(layer => {

    const div = document.createElement("div");
    div.className = "layer-item";

    div.innerHTML = `
      <label>
        <input type="checkbox" id="toggle-${layer.id}" checked>
        ${layer.name}
      </label>
    `;

    el.appendChild(div);

    setTimeout(() => {
      document
        .getElementById(`toggle-${layer.id}`)
        .addEventListener("change", (e) => {

          if (!map.getLayer(layer.id)) return;

          map.setLayoutProperty(
            layer.id,
            "visibility",
            e.target.checked ? "visible" : "none"
          );
        });
    }, 0);
  });
}

</script>

</body>
</html>
